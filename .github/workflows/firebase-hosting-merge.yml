# Deploy to Firebase Hosting on merge (with env injection)
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd testProject
          npm ci

      - name: Inject build-time env (if provided)
        run: |
          cd testProject
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production || true
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production || true
          echo "VITE_FCM_VAPID_KEY=${{ secrets.VITE_FCM_VAPID_KEY }}" >> .env.production || true
          echo "VITE_FIREBASE_STORAGE=${{ secrets.VITE_FIREBASE_STORAGE }}" >> .env.production || true
          echo "VITE_SUPER_ADMIN_EMAIL=${{ secrets.VITE_SUPER_ADMIN_EMAIL }}" >> .env.production || true

      - name: Build
        run: |
          cd testProject
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FAMILY_ACTIVITY_SCHEDULER }}
          channelId: live
          projectId: family-activity-scheduler

      - name: Smoke check (verify live site)
        run: |
          echo "Waiting for propagation..."
          sleep 5
          for url in "https://family-activity-scheduler.web.app" "https://family-activity-scheduler.firebaseapp.com"; do
            echo "Checking $url"
            if ! curl -sSfL "$url" -o /dev/null; then
              echo "Smoke check failed for $url"
              exit 1
            fi
          done
          echo "Smoke check passed for live site."
